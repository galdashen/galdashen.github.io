<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">经济学插图</title>
  <desc id="desc">包含柱状图、趋势线和货币符号的经济学示意图</desc>
  <rect width="400" height="300" rx="20" fill="color-mix(in srgb, var(--ifm-color-primary-lightest) 10%, white)"/>

  <g transform="translate(200 150) scale(1.20) translate(-200 -162)">

  <line x1="72" y1="240" x2="334" y2="240" stroke="var(--ifm-color-primary-lighter)" stroke-width="4"/>

  <rect x="92" y="186" width="34" height="54" rx="6" fill="color-mix(in srgb, var(--ifm-color-primary-light) 80%, white)"/>
  <rect x="142" y="160" width="34" height="80" rx="6" fill="color-mix(in srgb, var(--ifm-color-primary-light) 80%, white)"/>
  <rect x="192" y="130" width="34" height="110" rx="6" fill="color-mix(in srgb, var(--ifm-color-primary-light) 80%, white)"/>

  <path d="M92 156 C132 140, 172 132, 226 96" fill="none" stroke="var(--ifm-color-primary)" stroke-width="6" stroke-linecap="round"/>
  <path d="M234 91 L221 91 L228 103 Z" fill="var(--ifm-color-primary)"/>

  <circle cx="292" cy="114" r="32" fill="color-mix(in srgb, var(--ifm-color-primary-lighter) 40%, white)" stroke="color-mix(in srgb, var(--ifm-color-primary) 70%, white)" stroke-width="5"/>
  <text x="292" y="124" text-anchor="middle" font-size="34" font-family="Consolas, Arial, sans-serif" fill="var(--ifm-color-primary-darkest)">$</text>
  </g>
</svg>
