<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">数学插图</title>
  <desc id="desc">包含坐标轴和函数曲线的数学示意图</desc>
  <rect width="400" height="300" rx="20" fill="color-mix(in srgb, var(--ifm-color-primary-lightest) 10%, white)"/>
  <line x1="70" y1="240" x2="340" y2="240" stroke="var(--ifm-color-primary)" stroke-width="4"/>
  <line x1="90" y1="260" x2="90" y2="60" stroke="var(--ifm-color-primary)" stroke-width="4"/>
  <path d="M90 220 C140 120, 210 280, 320 110" fill="none" stroke="var(--ifm-color-primary-light)" stroke-width="6" stroke-linecap="round"/>
  <text x="255" y="85" font-size="48" font-family="Arial, sans-serif" fill="var(--ifm-color-primary-darkest,)">∑</text>
  <circle cx="320" cy="110" r="7" fill="var(--ifm-color-primary-darkest)"/>
</svg>
