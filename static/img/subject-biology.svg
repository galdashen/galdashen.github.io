<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">生物学插图</title>
  <desc id="desc">包含精美 DNA 双螺旋的生物学科示意图</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="20" fill="color-mix(in srgb, var(--ifm-color-primary-lightest) 10%, white)"/>

  <!-- 通过修改下方的 translate 和 scale 参数，可以方便地平移和缩放整个内部图像 -->
  <g transform="translate(200 150) scale(0.9) translate(-200 -150)">
    <!-- 背景装饰元素（细胞/分子点缀） -->
    <g>
    <circle cx="60" cy="60" r="18" fill="var(--ifm-color-primary-light, #3acbb0)" opacity="0.3"/>
    <circle cx="320" cy="230" r="28" fill="var(--ifm-color-primary, #1fa287)" opacity="0.15"/>
    <circle cx="340" cy="70" r="10" fill="var(--ifm-color-primary-dark, #166a59)" opacity="0.2"/>
    <circle cx="80" cy="240" r="12" fill="var(--ifm-color-primary-darkest, #115043)" opacity="0.15"/>
    <circle cx="200" cy="40" r="6" fill="var(--ifm-color-primary, #1fa287)" opacity="0.4"/>
    <circle cx="180" cy="260" r="8" fill="var(--ifm-color-primary-light, #3acbb0)" opacity="0.3"/>
  </g>

  <!-- 完全居中的倾斜 DNA 双螺旋 -->
  <g transform="translate(200, 150) rotate(-35) translate(-200, -150)">
    
    <!-- 背部/暗色主骨架 -->
    <path d="M 0 150 Q 40 50, 80 150 T 160 150 T 240 150 T 320 150 T 400 150" fill="none" stroke="var(--ifm-color-primary-darkest, #115043)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)"/>

    <!-- 碱基对羁绊线 -->
    <g stroke="var(--ifm-color-primary-dark, #166a59)" stroke-width="7" stroke-linecap="round">
      <line x1="20" y1="112.5" x2="20" y2="187.5"/>
      <line x1="40" y1="100" x2="40" y2="200"/>
      <line x1="60" y1="112.5" x2="60" y2="187.5"/>
      
      <line x1="100" y1="187.5" x2="100" y2="112.5"/>
      <line x1="120" y1="200" x2="120" y2="100"/>
      <line x1="140" y1="187.5" x2="140" y2="112.5"/>
      
      <line x1="180" y1="112.5" x2="180" y2="187.5"/>
      <line x1="200" y1="100" x2="200" y2="200"/>
      <line x1="220" y1="112.5" x2="220" y2="187.5"/>
      
      <line x1="260" y1="187.5" x2="260" y2="112.5"/>
      <line x1="280" y1="200" x2="280" y2="100"/>
      <line x1="300" y1="187.5" x2="300" y2="112.5"/>
      
      <line x1="340" y1="112.5" x2="340" y2="187.5"/>
      <line x1="360" y1="100" x2="360" y2="200"/>
      <line x1="380" y1="112.5" x2="380" y2="187.5"/>
    </g>

    <!-- 碱基对羁绊两端装饰球 -->
    <g fill="var(--ifm-color-primary-lightest, #e9f7f1)">
      <!-- 周期1 -->
      <circle cx="20" cy="112.5" r="4"/><circle cx="20" cy="187.5" r="4"/>
      <circle cx="40" cy="100" r="4"/><circle cx="40" cy="200" r="4"/>
      <circle cx="60" cy="112.5" r="4"/><circle cx="60" cy="187.5" r="4"/>
      <!-- 周期2 -->
      <circle cx="100" cy="112.5" r="4"/><circle cx="100" cy="187.5" r="4"/>
      <circle cx="120" cy="100" r="4"/><circle cx="120" cy="200" r="4"/>
      <circle cx="140" cy="112.5" r="4"/><circle cx="140" cy="187.5" r="4"/>
      <!-- 周期3 -->
      <circle cx="180" cy="112.5" r="4"/><circle cx="180" cy="187.5" r="4"/>
      <circle cx="200" cy="100" r="4"/><circle cx="200" cy="200" r="4"/>
      <circle cx="220" cy="112.5" r="4"/><circle cx="220" cy="187.5" r="4"/>
      <!-- 周期4 -->
      <circle cx="260" cy="112.5" r="4"/><circle cx="260" cy="187.5" r="4"/>
      <circle cx="280" cy="100" r="4"/><circle cx="280" cy="200" r="4"/>
      <circle cx="300" cy="112.5" r="4"/><circle cx="300" cy="187.5" r="4"/>
      <!-- 周期5 -->
      <circle cx="340" cy="112.5" r="4"/><circle cx="340" cy="187.5" r="4"/>
      <circle cx="360" cy="100" r="4"/><circle cx="360" cy="200" r="4"/>
      <circle cx="380" cy="112.5" r="4"/><circle cx="380" cy="187.5" r="4"/>
    </g>

    <!-- 腹部/亮色主骨架 -->
    <path d="M 0 150 Q 40 250, 80 150 T 160 150 T 240 150 T 320 150 T 400 150" fill="none" stroke="var(--ifm-color-primary, #1fa287)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)"/>
  </g>
  </g> <!-- 结束外层位置调节容器 -->
</svg>
